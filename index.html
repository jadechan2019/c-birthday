<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C 的生日礼物｜Gesture Particle Album</title>
  <style>
    :root {
      --bg-0: #07070b;
      --bg-1: #11121a;
      --cream: #f4ead8;
      --champagne: #d6b77a;
      --rose: #d8a7a7;
      --sage: #9fb7a2;
      --ink: #17151a;
      --glass: rgba(255,255,255,.08);
      --glass-strong: rgba(255,255,255,.16);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #1a1824 0, var(--bg-0) 46%, #020204 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--cream);
    }

    #stage {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #camera {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 220px;
      height: 124px;
      object-fit: cover;
      transform: scaleX(-1);
      border: 1px solid rgba(244, 234, 216, .25);
      border-radius: 18px;
      opacity: .28;
      z-index: 6;
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
      transition: opacity .25s ease, transform .25s ease;
    }
    #camera:hover { opacity: .82; transform: scaleX(-1) translateY(-2px); }

    .hud {
      position: fixed;
      z-index: 5;
      left: 28px;
      top: 24px;
      width: min(430px, calc(100vw - 56px));
      padding: 18px 18px 16px;
      border: 1px solid rgba(244,234,216,.14);
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 80px rgba(0,0,0,.28);
    }

    .kicker {
      letter-spacing: .22em;
      text-transform: uppercase;
      font-size: 11px;
      color: rgba(244,234,216,.62);
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 750;
      color: var(--cream);
    }

    .status {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px 12px;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(244,234,216,.78);
    }

    .status b {
      color: var(--champagne);
      font-weight: 650;
    }

    .steps {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(244,234,216,.14);
      background: rgba(244,234,216,.055);
      color: rgba(244,234,216,.7);
      font-size: 12px;
    }
    .pill.done {
      background: rgba(214,183,122,.16);
      border-color: rgba(214,183,122,.46);
      color: #ffe8b8;
    }
    .pill.active {
      background: rgba(216,167,167,.18);
      border-color: rgba(216,167,167,.52);
      color: #ffdede;
      box-shadow: 0 0 26px rgba(216,167,167,.14);
    }

    .controls {
      position: fixed;
      left: 28px;
      bottom: 24px;
      z-index: 5;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      max-width: calc(100vw - 300px);
    }

    button, label.upload {
      appearance: none;
      border: 1px solid rgba(244,234,216,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--cream);
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(14px);
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }
    button:hover, label.upload:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.13);
      border-color: rgba(214,183,122,.42);
    }
    input[type="file"] { display: none; }

    .bigText {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      pointer-events: none;
      text-align: center;
    }

    #centerTitle {
      font-size: clamp(52px, 9vw, 138px);
      font-weight: 850;
      line-height: 1;
      letter-spacing: -.04em;
      color: rgba(244,234,216,.96);
      text-shadow: 0 0 18px rgba(214,183,122,.3), 0 12px 70px rgba(0,0,0,.65);
      opacity: 0;
      transform: scale(.88) translateY(18px);
      transition: opacity .55s ease, transform .55s cubic-bezier(.18,.88,.22,1.18);
    }
    #centerTitle.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    #centerSub {
      margin-top: 16px;
      font-size: clamp(15px, 1.8vw, 24px);
      letter-spacing: .18em;
      color: rgba(244,234,216,.64);
      opacity: 0;
      transition: opacity .6s ease .15s;
    }
    #centerSub.show { opacity: 1; }

    .hint {
      position: fixed;
      right: 26px;
      top: 24px;
      z-index: 5;
      width: 300px;
      padding: 14px 15px;
      border-radius: 20px;
      border: 1px solid rgba(244,234,216,.12);
      background: rgba(9,9,14,.38);
      backdrop-filter: blur(16px);
      color: rgba(244,234,216,.72);
      font-size: 12px;
      line-height: 1.55;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 20;
      background: radial-gradient(circle at center, rgba(34,31,43,.96), rgba(4,4,7,.98));
      transition: opacity .45s ease, visibility .45s ease;
    }
    .loading.hide { opacity: 0; visibility: hidden; }
    .loadingCard {
      width: min(520px, calc(100vw - 40px));
      padding: 28px;
      border-radius: 28px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(244,234,216,.16);
      text-align: center;
      box-shadow: 0 30px 100px rgba(0,0,0,.4);
    }
    .loadingCard h2 { margin: 0 0 10px; }
    .loadingCard p { margin: 0; color: rgba(244,234,216,.68); line-height: 1.7; }

    @media (max-width: 760px) {
      .hint { display: none; }
      #camera { width: 150px; height: 86px; }
      .controls { max-width: calc(100vw - 56px); }
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <video id="camera" playsinline></video>

  <div class="loading" id="loading">
    <div class="loadingCard">
      <h2>送给 C 的生日仪式</h2>
      <p>点击下方按钮，允许摄像头权限后，按顺序做出 3、2、1 手势进入倒计时。</p>
      <button id="enterBtn" style="margin-top:18px;padding:12px 22px;border-radius:999px;border:1px solid rgba(214,183,122,.45);background:rgba(214,183,122,.16);color:#f4ead8;font-size:15px;cursor:pointer;">开启生日仪式</button>
    </div>
  </div>

  <section class="hud">
    <div class="kicker">Gesture Birthday Album</div>
    <h1>送给 C 的生日礼物 · 手势粒子相册</h1>
    <div class="status">
      <span>当前识别</span><b id="gestureName">等待手势</b>
      <span>当前阶段</span><b id="phaseName">等待 3 手势</b>
      <span>相册照片</span><b id="photoCount">正在准备照片</b>
    </div>
    <div class="steps" id="steps">
      <span class="pill active">3</span>
      <span class="pill">2</span>
      <span class="pill">1</span>
      <span class="pill">立体相册</span>
      <span class="pill">花手</span>
      <span class="pill">爱心</span>
      <span class="pill">开掌彩带</span>
    </div>
  </section>

  <aside class="hint">
    <b>玩法：</b><br />
    1. 点击“开启生日仪式”并允许摄像头；<br />
    2. 依次做 3、2、1，必须识别到当前数字才进入下一步；<br />
    3. 相册阶段：拳头 → 开掌，切换照片；<br />
    4. 花手：生日快乐；爱心：立体爱心；最后开掌：彩带绽放。
  </aside>

  <div class="controls">
    <button id="startBtn">重新开启摄像头</button>
    <button id="resetBtn">重置仪式</button>
    <button id="nextBtn" title="彩排救场用：正式送出前可在 CSS 中隐藏">手动推进</button>
    <input id="imageInput" type="file" accept="image/*" multiple />
  </div>

  <div class="bigText">
    <div>
      <div id="centerTitle"></div>
      <div id="centerSub"></div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

    // MediaPipe Hands 走全局脚本，兼容性更稳。
    const mpScripts = [
      "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js",
      "https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js",
      "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
    ];

    async function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    for (const src of mpScripts) await loadScript(src);

    const stage = document.querySelector("#stage");
    const video = document.querySelector("#camera");
    const loading = document.querySelector("#loading");
    const gestureNameEl = document.querySelector("#gestureName");
    const phaseNameEl = document.querySelector("#phaseName");
    const photoCountEl = document.querySelector("#photoCount");
    const centerTitle = document.querySelector("#centerTitle");
    const centerSub = document.querySelector("#centerSub");
    const imageInput = document.querySelector("#imageInput");
    const enterBtn = document.querySelector("#enterBtn");
    const resetBtn = document.querySelector("#resetBtn");
    const startBtn = document.querySelector("#startBtn");
    const nextBtn = document.querySelector("#nextBtn");
    const stepPills = Array.from(document.querySelectorAll(".pill"));

    const STATE = {
      WAIT_3: 0,
      WAIT_2: 1,
      WAIT_1: 2,
      ALBUM: 3,
      WAIT_FLOWER: 4,
      WAIT_HEART: 5,
      WAIT_CONFETTI: 6,
      END: 7
    };

    const phaseLabels = [
      "等待 3 手势",
      "等待 2 手势",
      "等待 1 手势",
      "立体粒子相册：拳头 → 开掌切换照片",
      "等待花手：显示生日快乐",
      "等待爱心：生成立体流动爱心",
      "等待开掌：绽放满屏彩带",
      "生日仪式完成"
    ];

    let phase = STATE.WAIT_3;
    let lastStableGesture = "none";
    let gestureBuffer = [];
    let lastSwitchGesture = "none";
    let lastActionTime = 0;
    let photos = [];
    let currentPhoto = 0;
    let cameraStarted = false;

    // 正式礼物版：这里已经按你 GitHub 当前上传的文件名配置好了。
    // 注意：GitHub 区分大小写，1.JPG 和 1.jpg 是两个不同名字。
    const PHOTO_URLS = [
      "./1.JPG",
      "./2.jpg",
      "./3.jpg",
      "./4.JPG",
      "./5.JPG",
      "./6.JPG",
      "./7.JPG",
      "./8.JPG"
    ];

    const clock = new THREE.Clock();
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x07070b, 0.045);

    const camera3D = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 120);
    camera3D.position.set(0, 0.4, 9);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    stage.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera3D));
    const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.45, 0.18);
    composer.addPass(bloom);

    const palette = {
      cream: new THREE.Color("#f4ead8"),
      champagne: new THREE.Color("#d6b77a"),
      rose: new THREE.Color("#d8a7a7"),
      sage: new THREE.Color("#9fb7a2"),
      pearl: new THREE.Color("#e8e1d7")
    };

    // ---------- 背景星尘 ----------
    const bgGroup = new THREE.Group();
    scene.add(bgGroup);
    const bgCount = 1200;
    const bgGeo = new THREE.BufferGeometry();
    const bgPos = new Float32Array(bgCount * 3);
    const bgCol = new Float32Array(bgCount * 3);
    for (let i = 0; i < bgCount; i++) {
      const r = 16 + Math.random() * 22;
      const a = Math.random() * Math.PI * 2;
      const y = (Math.random() - .5) * 14;
      bgPos[i * 3] = Math.cos(a) * r;
      bgPos[i * 3 + 1] = y;
      bgPos[i * 3 + 2] = Math.sin(a) * r - 8;
      const c = [palette.champagne, palette.cream, palette.sage][Math.floor(Math.random() * 3)];
      bgCol[i * 3] = c.r; bgCol[i * 3 + 1] = c.g; bgCol[i * 3 + 2] = c.b;
    }
    bgGeo.setAttribute("position", new THREE.BufferAttribute(bgPos, 3));
    bgGeo.setAttribute("color", new THREE.BufferAttribute(bgCol, 3));
    const bgMat = new THREE.PointsMaterial({ size: .035, vertexColors: true, transparent: true, opacity: .55, depthWrite: false });
    const bgPoints = new THREE.Points(bgGeo, bgMat);
    bgGroup.add(bgPoints);

    // ---------- 主粒子系统 ----------
    const PARTICLE_COUNT = 22000;
    const pGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const targets = new Float32Array(PARTICLE_COUNT * 3);
    const origins = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);
    const randoms = new Float32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = randomSphere(8 + Math.random() * 4);
      positions.set(p, i * 3);
      targets.set(p, i * 3);
      origins.set(p, i * 3);
      const c = [palette.cream, palette.champagne, palette.rose, palette.sage][Math.floor(Math.random() * 4)];
      colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
      sizes[i] = 0.025 + Math.random() * 0.035;
      randoms[i] = Math.random();
    }

    pGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    pGeo.setAttribute("aColor", new THREE.BufferAttribute(colors, 3));
    pGeo.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));
    pGeo.setAttribute("aRandom", new THREE.BufferAttribute(randoms, 1));

    const pMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: { uTime: { value: 0 }, uPixelRatio: { value: renderer.getPixelRatio() } },
      vertexShader: `
        attribute vec3 aColor;
        attribute float aSize;
        attribute float aRandom;
        varying vec3 vColor;
        uniform float uTime;
        uniform float uPixelRatio;
        void main() {
          vColor = aColor;
          vec3 p = position;
          p.x += sin(uTime * .8 + aRandom * 18.0) * .025;
          p.y += cos(uTime * .65 + aRandom * 15.0) * .025;
          vec4 mvPosition = modelViewMatrix * vec4(p, 1.0);
          gl_PointSize = aSize * uPixelRatio * 520.0 / -mvPosition.z;
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        void main() {
          vec2 uv = gl_PointCoord - .5;
          float d = length(uv);
          float alpha = smoothstep(.5, .05, d);
          alpha *= .86;
          gl_FragColor = vec4(vColor, alpha);
        }
      `
    });
    const particleMesh = new THREE.Points(pGeo, pMat);
    scene.add(particleMesh);

    // ---------- 相册平面 ----------
    const albumGroup = new THREE.Group();
    scene.add(albumGroup);
    const albumPlanes = [];

    // ---------- 彩带 ----------
    const confettiGroup = new THREE.Group();
    scene.add(confettiGroup);

    function randomSphere(radius = 1) {
      const u = Math.random();
      const v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      const r = radius * Math.cbrt(Math.random());
      return [r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi)];
    }

    function setPhase(next) {
      phase = next;
      phaseNameEl.textContent = phaseLabels[phase] || "";
      stepPills.forEach((pill, idx) => {
        pill.classList.toggle("done", idx < Math.min(phase, 7));
        pill.classList.toggle("active", idx === Math.min(phase, 6));
      });
    }

    function showCenter(title, sub = "", duration = 1200) {
      centerTitle.textContent = title;
      centerSub.textContent = sub;
      centerTitle.classList.add("show");
      centerSub.classList.toggle("show", !!sub);
      window.clearTimeout(showCenter._t);
      showCenter._t = window.setTimeout(() => {
        centerTitle.classList.remove("show");
        centerSub.classList.remove("show");
      }, duration);
    }

    function triggerCountdown(n) {
      showCenter(String(n), n === 1 ? "Make a wish" : "The ceremony begins", 900);
      bloom.strength = 1.4;
      const radius = 2.1 + n * .18;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const t = i / PARTICLE_COUNT;
        const ring = Math.floor(t * 8);
        const angle = t * Math.PI * 2 * 28;
        const rr = radius + Math.sin(angle * 2 + n) * .16 + ring * .025;
        targets[i * 3] = Math.cos(angle) * rr;
        targets[i * 3 + 1] = Math.sin(angle) * rr;
        targets[i * 3 + 2] = (Math.random() - .5) * .55;
        tintParticle(i, [palette.cream, palette.champagne, palette.rose][i % 3]);
      }
      pGeo.attributes.aColor.needsUpdate = true;
      setTimeout(() => bloom.strength = .8, 700);
    }

    function tintParticle(i, c) {
      colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
    }

    function makeTextParticles(text, scale = 1, yOffset = 0) {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      canvas.width = 1200;
      canvas.height = 420;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 180px 'PingFang SC','Microsoft YaHei',Arial";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
      const img = ctx.getImageData(0,0,canvas.width,canvas.height).data;
      const pts = [];
      for (let y = 0; y < canvas.height; y += 5) {
        for (let x = 0; x < canvas.width; x += 5) {
          const a = img[(y * canvas.width + x) * 4 + 3];
          if (a > 80) {
            pts.push([(x - canvas.width / 2) / 95 * scale, -(y - canvas.height / 2) / 95 * scale + yOffset, (Math.random() - .5) * .55]);
          }
        }
      }
      return pts;
    }

    function showBirthdayText() {
      showCenter("生日快乐", "C, may every season be bright", 2200);
      const pts = makeTextParticles("生日快乐", 1.05, .08);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = pts[i % pts.length];
        targets[i * 3] = p[0] + (Math.random() - .5) * .018;
        targets[i * 3 + 1] = p[1] + (Math.random() - .5) * .018;
        targets[i * 3 + 2] = p[2];
        tintParticle(i, [palette.cream, palette.champagne, palette.rose][i % 3]);
      }
      pGeo.attributes.aColor.needsUpdate = true;
    }

    function showHeart() {
      showCenter("❤", "A little universe, made by hand", 1600);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const u = Math.random() * Math.PI * 2;
        const v = Math.random() * Math.PI;
        const x = 16 * Math.pow(Math.sin(u), 3) / 6.5;
        const y = (13 * Math.cos(u) - 5 * Math.cos(2*u) - 2 * Math.cos(3*u) - Math.cos(4*u)) / 6.5;
        const depth = (Math.sin(v) * Math.cos(u * 1.7 + i) + (Math.random() - .5) * .8) * .72;
        const shell = .72 + Math.random() * .4;
        targets[i * 3] = x * shell;
        targets[i * 3 + 1] = y * shell - .35;
        targets[i * 3 + 2] = depth;
        tintParticle(i, [palette.rose, palette.cream, palette.champagne][i % 3]);
      }
      pGeo.attributes.aColor.needsUpdate = true;
      bloom.strength = 1.15;
    }

    async function fileToTexture(file) {
      const url = URL.createObjectURL(file);
      return urlToTexture(url);
    }

    async function urlToTexture(url) {
      const texture = await new Promise((resolve, reject) => {
        new THREE.TextureLoader().load(url, resolve, undefined, reject);
      });
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.userData.url = url;
      return texture;
    }

    async function loadPresetPhotos() {
      photos = [];
      currentPhoto = 0;
      for (let i = 0; i < PHOTO_URLS.length; i++) {
        try {
          const texture = await urlToTexture(PHOTO_URLS[i]);
          photos.push({ file: { name: `photo-${i + 1}` }, texture });
        } catch (err) {
          console.warn(`照片加载失败：${PHOTO_URLS[i]}`, err);
        }
      }
      photoCountEl.textContent = photos.length ? `${photos.length} 张` : "未找到照片，请检查 photos 文件夹";
      buildAlbumPlanes();
      if (photos.length) morphToPhoto(0);
    }

    async function loadFiles(files) {
      photos = [];
      currentPhoto = 0;
      for (const file of files) {
        if (!file.type.startsWith("image/")) continue;
        const texture = await fileToTexture(file);
        photos.push({ file, texture });
      }
      photoCountEl.textContent = `${photos.length} 张`;
      buildAlbumPlanes();
      if (photos.length) morphToPhoto(0);
    }

    function buildAlbumPlanes() {
      albumPlanes.forEach(p => albumGroup.remove(p));
      albumPlanes.length = 0;
      photos.forEach((photo, i) => {
        const geo = new THREE.PlaneGeometry(3.2, 2.15, 1, 1);
        const mat = new THREE.MeshBasicMaterial({
          map: photo.texture,
          transparent: true,
          opacity: i === currentPhoto ? .52 : .18,
          depthWrite: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        const angle = (i / Math.max(photos.length, 1)) * Math.PI * 2;
        mesh.position.set(Math.sin(angle) * 4.2, -0.1 + Math.cos(i) * .24, Math.cos(angle) * 2.2 - 1.2);
        mesh.rotation.y = -angle + Math.PI;
        mesh.rotation.z = (Math.random() - .5) * .08;
        albumGroup.add(mesh);
        albumPlanes.push(mesh);
      });
    }

    function sampleImagePoints(texture, maxPoints) {
      const img = texture.image;
      const canvas = document.createElement("canvas");
      const w = 360;
      const h = Math.max(220, Math.round(w * img.height / img.width));
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0,0,w,h).data;
      const pts = [];
      const step = Math.max(2, Math.floor(Math.sqrt((w*h) / maxPoints)));
      for (let y = 0; y < h; y += step) {
        for (let x = 0; x < w; x += step) {
          const idx = (y * w + x) * 4;
          const alpha = data[idx + 3];
          if (alpha < 40) continue;
          const px = (x - w/2) / 72;
          const py = -(y - h/2) / 72;
          const pz = (Math.random() - .5) * .42;
          pts.push({
            x: px, y: py, z: pz,
            c: new THREE.Color(data[idx]/255, data[idx+1]/255, data[idx+2]/255)
          });
        }
      }
      return pts;
    }

    function morphToPhoto(index) {
      if (!photos.length) {
        showCenter("请先加载照片", "支持一次选择多张图片", 1400);
        return;
      }
      currentPhoto = (index + photos.length) % photos.length;
      albumPlanes.forEach((p, i) => {
        p.material.opacity = i === currentPhoto ? .56 : .16;
      });
      const pts = sampleImagePoints(photos[currentPhoto].texture, PARTICLE_COUNT);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = pts[i % pts.length];
        const curl = Math.sin(i * .013) * .28;
        targets[i * 3] = p.x;
        targets[i * 3 + 1] = p.y;
        targets[i * 3 + 2] = p.z + curl;
        colors[i * 3] = p.c.r * .78 + palette.champagne.r * .22;
        colors[i * 3 + 1] = p.c.g * .78 + palette.champagne.g * .22;
        colors[i * 3 + 2] = p.c.b * .78 + palette.champagne.b * .22;
      }
      pGeo.attributes.aColor.needsUpdate = true;
      showCenter(`第 ${currentPhoto + 1} 张`, "fist → palm to turn the page", 900);
    }

    function nextPhoto() {
      morphToPhoto(currentPhoto + 1);
    }

    function burstConfetti() {
      showCenter("生日快乐 C", "Tonight is yours", 2400);
      for (let i = confettiGroup.children.length - 1; i >= 0; i--) confettiGroup.remove(confettiGroup.children[i]);
      const confettiColors = [0xf4ead8, 0xd6b77a, 0xd8a7a7, 0x9fb7a2, 0xb9b0a2];
      for (let i = 0; i < 520; i++) {
        const geo = new THREE.PlaneGeometry(.045 + Math.random()*.05, .18 + Math.random()*.22);
        const mat = new THREE.MeshBasicMaterial({ color: confettiColors[i % confettiColors.length], transparent: true, opacity: .92, side: THREE.DoubleSide });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set((Math.random() - .5) * 12, 4 + Math.random() * 4, (Math.random() - .5) * 4);
        mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
        mesh.userData.vel = new THREE.Vector3((Math.random()-.5)*.055, -(.025 + Math.random()*.06), (Math.random()-.5)*.025);
        mesh.userData.spin = new THREE.Vector3((Math.random()-.5)*.16, (Math.random()-.5)*.16, (Math.random()-.5)*.16);
        confettiGroup.add(mesh);
      }
    }

    // ---------- 手势识别：规则尽量简单、可调 ----------
    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
    }

    function fingerExtended(lm, tip, pip, mcp) {
      // 摄像头坐标 y 越小越靠上；指尖明显高于 PIP/MCP 视为伸出。
      return lm[tip].y < lm[pip].y - 0.025 && lm[tip].y < lm[mcp].y - 0.04;
    }

    function thumbExtended(lm) {
      const wrist = lm[0];
      return dist(lm[4], wrist) > dist(lm[3], wrist) && dist(lm[4], lm[9]) > dist(lm[3], lm[9]);
    }

    function classifyGesture(lm) {
      if (!lm || lm.length < 21) return "none";
      const index = fingerExtended(lm, 8, 6, 5);
      const middle = fingerExtended(lm, 12, 10, 9);
      const ring = fingerExtended(lm, 16, 14, 13);
      const pinky = fingerExtended(lm, 20, 18, 17);
      const thumb = thumbExtended(lm);
      const count = [thumb, index, middle, ring, pinky].filter(Boolean).length;

      const palmSpread = dist(lm[8], lm[20]) > dist(lm[5], lm[17]) * 1.55 && count >= 4;
      const fistTight = count <= 1 && dist(lm[8], lm[0]) < dist(lm[5], lm[0]) * 1.45 && dist(lm[12], lm[0]) < dist(lm[9], lm[0]) * 1.45;

      // 单手爱心：拇指与食指靠近，其他手指可微曲。双手爱心请用摄像头里更清晰的一只手做半心/捏心。
      const heartPinch = dist(lm[4], lm[8]) < 0.07 && dist(lm[4], lm[12]) > 0.08;

      // 花手：五指张开且指尖间距很大，手掌略旋转也能触发。
      const flower = count >= 5 && dist(lm[4], lm[20]) > 0.28 && dist(lm[8], lm[16]) > 0.18;

      if (flower) return "flower";
      if (heartPinch) return "heart";
      if (palmSpread) return "palm";
      if (fistTight) return "fist";

      if (index && !middle && !ring && !pinky && !thumb) return "one";
      if (index && middle && !ring && !pinky) return "two";
      if (index && middle && ring && !pinky) return "three";

      return `open-${count}`;
    }

    function stableGesture(raw) {
      gestureBuffer.push(raw);
      if (gestureBuffer.length > 8) gestureBuffer.shift();
      const counts = new Map();
      for (const g of gestureBuffer) counts.set(g, (counts.get(g) || 0) + 1);
      let best = "none", bestN = 0;
      for (const [g, n] of counts) if (n > bestN) { best = g; bestN = n; }
      return bestN >= 4 ? best : lastStableGesture;
    }

    function handleGesture(g) {
      const now = performance.now();
      gestureNameEl.textContent = gestureText(g);
      if (now - lastActionTime < 900) return;

      if (phase === STATE.WAIT_3 && g === "three") {
        triggerCountdown(3); setPhase(STATE.WAIT_2); lastActionTime = now;
      } else if (phase === STATE.WAIT_2 && g === "two") {
        triggerCountdown(2); setPhase(STATE.WAIT_1); lastActionTime = now;
      } else if (phase === STATE.WAIT_1 && g === "one") {
        triggerCountdown(1); setTimeout(() => { setPhase(STATE.ALBUM); if (photos.length) morphToPhoto(0); }, 950); lastActionTime = now;
      } else if (phase === STATE.ALBUM) {
        if (lastSwitchGesture === "fist" && g === "palm") {
          nextPhoto(); lastActionTime = now;
        }
        if (g === "flower") { showBirthdayText(); setPhase(STATE.WAIT_HEART); lastActionTime = now; }
        lastSwitchGesture = g;
      } else if (phase === STATE.WAIT_FLOWER && g === "flower") {
        showBirthdayText(); setPhase(STATE.WAIT_HEART); lastActionTime = now;
      } else if (phase === STATE.WAIT_HEART && g === "heart") {
        showHeart(); setPhase(STATE.WAIT_CONFETTI); lastActionTime = now;
      } else if (phase === STATE.WAIT_CONFETTI && g === "palm") {
        burstConfetti(); setPhase(STATE.END); lastActionTime = now;
      }
    }

    function gestureText(g) {
      return ({
        none: "等待手势",
        one: "1",
        two: "2",
        three: "3",
        fist: "拳头",
        palm: "开掌",
        flower: "花手",
        heart: "爱心 / 捏心"
      })[g] || g;
    }

    const hands = new window.Hands({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.72,
      minTrackingConfidence: 0.68
    });
    hands.onResults(results => {
      const lm = results.multiHandLandmarks?.[0];
      const raw = classifyGesture(lm);
      const stable = stableGesture(raw);
      lastStableGesture = stable;
      handleGesture(stable);
    });

    let mpCamera;
    async function startCamera() {
      if (cameraStarted) return;
      mpCamera = new window.Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 960,
        height: 540
      });
      await mpCamera.start();
      cameraStarted = true;
      loading.classList.add("hide");
    }

    startBtn.addEventListener("click", startCamera);
    enterBtn.addEventListener("click", () => startCamera().catch(() => loading.classList.remove("hide")));

    imageInput.addEventListener("change", async e => {
      await loadFiles(Array.from(e.target.files || []));
    });

    resetBtn.addEventListener("click", () => {
      setPhase(STATE.WAIT_3);
      lastSwitchGesture = "none";
      bloom.strength = .8;
      showCenter("重新开始", "show 3 to begin", 1000);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = randomSphere(8 + Math.random()*2);
        targets.set(p, i*3);
        tintParticle(i, [palette.cream, palette.champagne, palette.sage][i%3]);
      }
      pGeo.attributes.aColor.needsUpdate = true;
    });

    nextBtn.addEventListener("click", () => {
      if (phase === STATE.WAIT_3) { triggerCountdown(3); setPhase(STATE.WAIT_2); }
      else if (phase === STATE.WAIT_2) { triggerCountdown(2); setPhase(STATE.WAIT_1); }
      else if (phase === STATE.WAIT_1) { triggerCountdown(1); setTimeout(() => setPhase(STATE.ALBUM), 900); }
      else if (phase === STATE.ALBUM) { nextPhoto(); }
      else if (phase === STATE.WAIT_FLOWER) { showBirthdayText(); setPhase(STATE.WAIT_HEART); }
      else if (phase === STATE.WAIT_HEART) { showHeart(); setPhase(STATE.WAIT_CONFETTI); }
      else if (phase === STATE.WAIT_CONFETTI) { burstConfetti(); setPhase(STATE.END); }
    });

    // 相册阶段可以跳到花手：这里保留一个小逻辑，至少翻完一张后仍可直接用花手推进。
    function animate() {
      const t = clock.getElapsedTime();
      pMat.uniforms.uTime.value = t;

      const pos = pGeo.attributes.position.array;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ix = i * 3;
        const ease = phase === STATE.WAIT_CONFETTI ? .025 : .045;
        pos[ix] += (targets[ix] - pos[ix]) * ease;
        pos[ix + 1] += (targets[ix + 1] - pos[ix + 1]) * ease;
        pos[ix + 2] += (targets[ix + 2] - pos[ix + 2]) * ease;

        if (phase === STATE.WAIT_CONFETTI) {
          const flow = Math.sin(t * 1.8 + randoms[i] * 12) * .002;
          pos[ix] += flow;
          pos[ix + 1] += Math.cos(t * 1.4 + randoms[i] * 10) * .002;
        }
      }
      pGeo.attributes.position.needsUpdate = true;

      bgGroup.rotation.y += .0008;
      particleMesh.rotation.y = Math.sin(t * .22) * .08;
      particleMesh.rotation.x = Math.cos(t * .18) * .035;

      albumGroup.rotation.y += .0022;
      albumGroup.children.forEach((m, i) => {
        m.position.y += Math.sin(t * .8 + i) * .0009;
        m.lookAt(camera3D.position.x, m.position.y, camera3D.position.z);
      });

      confettiGroup.children.forEach(mesh => {
        mesh.position.add(mesh.userData.vel);
        mesh.rotation.x += mesh.userData.spin.x;
        mesh.rotation.y += mesh.userData.spin.y;
        mesh.rotation.z += mesh.userData.spin.z;
        if (mesh.position.y < -4.5) {
          mesh.position.y = 4.5 + Math.random()*2;
          mesh.position.x = (Math.random()-.5)*12;
        }
      });

      composer.render();
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener("resize", () => {
      camera3D.aspect = window.innerWidth / window.innerHeight;
      camera3D.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloom.setSize(window.innerWidth, window.innerHeight);
      pMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
    });

    setPhase(STATE.WAIT_3);
    loadPresetPhotos();
  </script>
</body>
</html>
