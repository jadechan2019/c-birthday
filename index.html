<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC的22岁生日</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.160.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber",
        "@react-three/postprocessing": "https://esm.sh/@react-three/postprocessing@2.16.0?external=react,react-dom,three,@react-three/fiber"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 强制全局使用 Apple 系统级字体栈 (PingFang SC / San Francisco) */
    body, html { 
      margin: 0; padding: 0; width: 100%; height: 100%; background-color: #010102; overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { width: 100%; height: 100%; }
    
    /* 苹果风毛玻璃按钮质感 */
    .glass-btn { 
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2); 
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <video id="webcam" class="hidden" playsinline autoplay></video>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo, Suspense } from 'react';
    import { createRoot } from 'react-dom/client';
    import * as THREE from 'three';
    import { Canvas, useFrame } from '@react-three/fiber';
    import { OrbitControls, Image as DreiImage, Text } from '@react-three/drei';
    import { EffectComposer, Bloom, Noise } from '@react-three/postprocessing';

    // 麦克风音频分析 (识别吹气)
    function useBlowDetector(isActive, onBlow) {
      useEffect(() => {
        if (!isActive) return;
        let audioCtx, analyser, dataArray, reqId;
        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          audioCtx.createMediaStreamSource(stream).connect(analyser);
          dataArray = new Uint8Array(analyser.frequencyBinCount);
          const detect = () => {
            analyser.getByteFrequencyData(dataArray);
            if (dataArray.reduce((a, b) => a + b) / dataArray.length > 70) onBlow();
            else reqId = requestAnimationFrame(detect);
          };
          detect();
        }).catch(e => console.warn("Mic error:", e));
        return () => { if (reqId) cancelAnimationFrame(reqId); if (audioCtx) audioCtx.close(); };
      }, [isActive, onBlow]);
    }

    // 核心渲染：精准 7 层蛋糕拓扑与星系插值
    const PARTICLE_COUNT = 50000;
    const vertexShader = `
      attribute vec3 aGalaxyPos; attribute vec3 aCakePos; attribute vec3 aColor;
      uniform float uProgress; uniform float uTime; varying vec3 vColor;
      void main() {
        vec3 pos = mix(aCakePos, aGalaxyPos, uProgress);
        pos.y += sin(uTime * 2.0 + pos.x * 5.0) * 0.02; // 微弱呼吸感
        gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(pos, 1.0);
        vColor = aColor;
      }
    `;
    const fragmentShader = `
      varying vec3 vColor;
      void main() { gl_FragColor = vec4(vColor * 2.5, 1.0); } 
    `;

    function MagicMorphingSystem({ isExploded }) {
      const meshRef = useRef(null);
      const matRef = useRef(null);

      const { cakePos, galaxyPos, colors } = useMemo(() => {
        const cPos = new Float32Array(PARTICLE_COUNT * 3);
        const gPos = new Float32Array(PARTICLE_COUNT * 3);
        const cols = new Float32Array(PARTICLE_COUNT * 3);
        
        const tiffanyBlue = new THREE.Color('#81D8D0');
        const creamWhite = new THREE.Color('#F8F9FA');
        const candleGold = new THREE.Color('#FFD700');

        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const i3 = i * 3;
          
          const tier = Math.floor((i / PARTICLE_COUNT) * 7); 
          const tierRadius = 2.8 - tier * 0.35; 
          const yBottom = tier * 0.4 - 1.5;
          const yTop = yBottom + 0.35;
          
          const isTopSurface = Math.random() > 0.6; 
          const theta = Math.random() * Math.PI * 2;
          
          if (tier === 6 && isTopSurface && Math.random() > 0.8) {
            cPos[i3] = (Math.random() - 0.5) * 0.2;
            cPos[i3+1] = yTop + Math.random() * 0.6;
            cPos[i3+2] = (Math.random() - 0.5) * 0.2;
            cols[i3] = candleGold.r; cols[i3+1] = candleGold.g; cols[i3+2] = candleGold.b;
          } else {
            if (isTopSurface) {
              const r = Math.sqrt(Math.random()) * tierRadius;
              cPos[i3] = Math.cos(theta) * r; cPos[i3+1] = yTop; cPos[i3+2] = Math.sin(theta) * r;
              cols[i3] = creamWhite.r; cols[i3+1] = creamWhite.g; cols[i3+2] = creamWhite.b;
            } else {
              cPos[i3] = Math.cos(theta) * tierRadius; cPos[i3+1] = yBottom + Math.random() * 0.35; cPos[i3+2] = Math.sin(theta) * tierRadius;
              cols[i3] = tiffanyBlue.r; cols[i3+1] = tiffanyBlue.g; cols[i3+2] = tiffanyBlue.b;
            }
          }

          const goldenAngle = 2.39996323;
          const rGal = Math.sqrt(i) * 0.05;
          const angle = i * goldenAngle;
          gPos[i3] = Math.cos(angle) * rGal;
          gPos[i3+1] = (Math.random() - 0.5) * 1.5;
          gPos[i3+2] = Math.sin(angle) * rGal;
        }
        return { cakePos: cPos, galaxyPos: gPos, colors: cols };
      }, []);

      useFrame((state) => {
        if (!matRef.current || !meshRef.current) return;
        matRef.current.uniforms.uTime.value = state.clock.elapsedTime;
        matRef.current.uniforms.uProgress.value = THREE.MathUtils.lerp(
          matRef.current.uniforms.uProgress.value, isExploded ? 1.0 : 0.0, 0.03
        );
        meshRef.current.rotation.y += 0.003; 
      });

      return (
        <instancedMesh ref={meshRef} args={[null, null, PARTICLE_COUNT]}>
          <octahedronGeometry args={[0.015, 0]}>
            <instancedBufferAttribute attach="attributes-aCakePos" args={[cakePos, 3]} />
            <instancedBufferAttribute attach="attributes-aGalaxyPos" args={[galaxyPos, 3]} />
            <instancedBufferAttribute attach="attributes-aColor" args={[colors, 3]} />
          </octahedronGeometry>
          <shaderMaterial ref={matRef} vertexShader={vertexShader} fragmentShader={fragmentShader} uniforms={{ uProgress: { value: 0 }, uTime: { value: 0 } }} transparent depthWrite={false} blending={THREE.AdditiveBlending} />
        </instancedMesh>
      );
    }

    // 画廊交互系统
    function PhotoGallery({ isExploded, activeIndex }) {
      const groupRef = useRef();
      const images = ['1.JPG', '2.jpg', '3.jpg', '4.JPG', '5.JPG', '6.JPG', '7.JPG', '8.JPG']; 
      const refs = useRef(images.map(() => React.createRef()));

      useFrame(() => {
        if (!groupRef.current) return;
        if (activeIndex === null) groupRef.current.rotation.y += 0.004;
        else groupRef.current.rotation.y = THREE.MathUtils.lerp(groupRef.current.rotation.y, (activeIndex / images.length) * Math.PI * 2, 0.08);

        refs.current.forEach((ref, i) => {
          if (!ref.current) return;
          const angle = (i / images.length) * Math.PI * 2;
          if (activeIndex === i) {
            ref.current.position.lerp(new THREE.Vector3(0, 0.5, 4.5), 0.1);
            ref.current.scale.lerp(new THREE.Vector3(2.5, 2.5 * 1.33, 1), 0.1);
            ref.current.rotation.set(0, 0, 0);
          } else {
            const r = 4.8;
            ref.current.position.lerp(new THREE.Vector3(Math.cos(angle)*r, Math.sin(angle*2)*0.5, Math.sin(angle)*r), 0.05);
            ref.current.scale.lerp(new THREE.Vector3(1.2, 1.2 * 1.33, 1), 0.05);
            ref.current.rotation.set(0, -angle + Math.PI / 2, 0);
          }
        });
      });

      if (!isExploded) return null;
      return (
        <group ref={groupRef}>
          {images.map((url, i) => ( <DreiImage key={url} ref={refs.current[i]} url={url} transparent opacity={activeIndex === null || activeIndex === i ? 0.95 : 0.15} /> ))}
        </group>
      );
    }

    // 核心状态机与视觉引导
    function App() {
      const [phase, setPhase] = useState(-1);
      const [activeIndex, setActiveIndex] = useState(null);
      const [hint, setHint] = useState("");
      const timer = useRef(Date.now());

      const start = () => {
        setPhase(0); setHint("请对镜头竖起 3 根手指");
        navigator.mediaDevices.getUserMedia({ audio: true }).catch(()=>{});
      };

      useBlowDetector(phase === 3, () => {
        setPhase(4);
        setHint("尝试“单手比心(捏合)”抓取照片放大，“OK手势”恢复轮播");
        const end = Date.now() + 4000;
        (function frame() {
          confetti({ particleCount: 10, angle: 60, spread: 70, origin: { x: 0 }, colors: ['#81D8D0', '#FFB6C1', '#FFF'] });
          confetti({ particleCount: 10, angle: 120, spread: 70, origin: { x: 1 }, colors: ['#81D8D0', '#FFB6C1', '#FFF'] });
          if (Date.now() < end) requestAnimationFrame(frame);
        }());
      });

      useEffect(() => {
        if (phase < 0) return;
        const video = document.getElementById('webcam');
        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75 });

        hands.onResults((res) => {
          if (!res.multiHandLandmarks?.length) return;
          const lm = res.multiHandLandmarks[0];
          const now = Date.now();
          if (now - timer.current < 1200) return; 

          const isUp = (tip, pip) => lm[tip].y < lm[pip].y;
          const fingers = [ lm[4].x < lm[3].x, isUp(8, 6), isUp(12, 10), isUp(16, 14), isUp(20, 18) ].filter(Boolean).length;

          setPhase(p => {
            if (p === 0 && fingers === 3) { timer.current = now; setHint("收到！现在比出 2"); return 1; }
            if (p === 1 && fingers === 2) { timer.current = now; setHint("完美！最后比出 1"); return 2; }
            if (p === 2 && fingers === 1) { timer.current = now; setHint("倒计时完成！对着麦克风用力吹灭蜡烛吧！"); return 3; }
            
            if (p === 4) {
              const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
              const isOK = pinchDist < 0.05 && isUp(12, 10) && isUp(16, 14); 
              const isHeart = pinchDist < 0.05 && !isOK; 

              if (isHeart && activeIndex === null) {
                setActiveIndex(Math.floor(Math.random() * 8)); timer.current = now;
              } else if (isOK && activeIndex !== null) {
                setActiveIndex(null); timer.current = now;
              }
            }
            return p;
          });
        });

        const cam = new Camera(video, { onFrame: async () => await hands.send({ image: video }), width: 640, height: 480 });
        cam.start();
      }, [phase, activeIndex]);

      return (
        <div className="w-full h-full relative">
          {phase === -1 && (
            <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#010102]">
              <h1 className="text-4xl font-semibold text-white mb-10 tracking-widest">CC的22岁生日</h1>
              <button onClick={start} className="glass-btn px-10 py-4 rounded-full text-white text-sm tracking-widest hover:bg-white hover:text-black transition duration-300">
                开启 (需允许摄像头与麦克风)
              </button>
            </div>
          )}

          {phase >= 0 && (
            <div className="absolute top-16 w-full text-center z-10 pointer-events-none">
              <h2 className="text-xl text-white tracking-[0.1em] font-medium opacity-80">{hint}</h2>
            </div>
          )}

          <Canvas camera={{ position: [0, 2, 9], fov: 45 }}>
            <color attach="background" args={['#010102']} />
            <ambientLight intensity={phase === 4 ? 0.8 : 0.2} />
            
            {phase < 4 && <pointLight position={[0, 3, 0]} intensity={4} color="#FF9900" distance={10} />}

            <MagicMorphingSystem isExploded={phase === 4} />
            
            {phase === 4 && (
              <Text 
                position={[0, 3.8, 0]} 
                fontSize={0.8} 
                color="#81D8D0" 
                font="https://fonts.gstatic.com/s/notosanssc/v36/k3kXo84MPYn4dIdJsslsBzxw.woff" 
                anchorX="center" 
                anchorY="middle"
              >
                cc 22岁生日快乐！
              </Text>
            )}

            <Suspense fallback={null}>
              <PhotoGallery isExploded={phase === 4} activeIndex={activeIndex} />
            </Suspense>

            <EffectComposer disableNormalPass>
              <Bloom luminanceThreshold={1.1} mipmapBlur intensity={1.8} />
              <Noise opacity={0.03} />
            </EffectComposer>
            <OrbitControls enablePan={false} enableZoom={false} enableDamping dampingFactor={0.05} />
          </Canvas>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
