<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC的22岁生日魔法</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Luxurious+Script&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.160.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050508; overflow: hidden; font-family: 'Noto Serif SC', serif; }
    #root { width: 100%; height: 100%; }
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-text { text-shadow: 0 0 10px rgba(129,216,208,0.8), 0 0 20px rgba(129,216,208,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <video id="webcam" class="hidden" playsinline autoplay></video>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import * as THREE from 'three';
    import { Canvas, useFrame } from '@react-three/fiber';
    import { OrbitControls, Image as DreiImage, Text } from '@react-three/drei';

    // === 音频监听 Hook (用于吹蜡烛) ===
    function useAudioBlowDetector(isActive, onBlow) {
      useEffect(() => {
        if (!isActive) return;
        let audioContext, analyser, microphone, dataArray;
        let animationId;

        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          microphone = audioContext.createMediaStreamSource(stream);
          microphone.connect(analyser);
          analyser.fftSize = 256;
          dataArray = new Uint8Array(analyser.frequencyBinCount);

          const checkVolume = () => {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let average = sum / dataArray.length;
            
            // 吹气阈值检测 (可根据实际麦克风灵敏度调整)
            if (average > 80) {
              onBlow();
            } else {
              animationId = requestAnimationFrame(checkVolume);
            }
          };
          checkVolume();
        }).catch(err => console.error("麦克风权限被拒绝:", err));

        return () => {
          if (animationId) cancelAnimationFrame(animationId);
          if (audioContext) audioContext.close();
        };
      }, [isActive, onBlow]);
    }

    // === 3D 粒子蛋糕 ===
    const PARTICLE_COUNT = 30000;
    function Cake({ phase }) {
      const meshRef = useRef();
      const materialRef = useRef();
      const isBlown = phase >= 4; // 蜡烛熄灭，蛋糕开始解体

      const { positions, colors } = useMemo(() => {
        const pos = new Float32Array(PARTICLE_COUNT * 3);
        const col = new Float32Array(PARTICLE_COUNT * 3);
        const tiffany = new THREE.Color('#81D8D0');
        const pink = new THREE.Color('#FFB6C1');
        
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const i3 = i * 3;
          const tier = Math.floor(Math.random() * 7);
          const radius = (7 - tier) * 0.4 * Math.random();
          const theta = Math.random() * Math.PI * 2;
          
          pos[i3] = Math.cos(theta) * radius;
          pos[i3 + 1] = tier * 0.5 - 1.5; 
          pos[i3 + 2] = Math.sin(theta) * radius;

          const mixedColor = tiffany.clone().lerp(pink, Math.random() * 0.5);
          col[i3] = mixedColor.r; col[i3+1] = mixedColor.g; col[i3+2] = mixedColor.b;
        }
        return { positions: pos, colors: col };
      }, []);

      useFrame((state) => {
        if (!meshRef.current) return;
        meshRef.current.rotation.y = state.clock.elapsedTime * 0.2;
        
        // 吹灭后粒子缓慢下沉消散
        if (isBlown && materialRef.current) {
          materialRef.current.opacity = THREE.MathUtils.lerp(materialRef.current.opacity, 0.1, 0.02);
        }
      });

      return (
        <points ref={meshRef}>
          <bufferGeometry>
            <bufferAttribute attach="attributes-position" args={[positions, 3]} />
            <bufferAttribute attach="attributes-color" args={[colors, 3]} />
          </bufferGeometry>
          <pointsMaterial ref={materialRef} size={0.03} vertexColors transparent opacity={0.8} depthWrite={false} blending={THREE.AdditiveBlending} />
        </points>
      );
    }

    // === 3D 照片画廊 ===
    function PhotoGallery({ phase, activeIndex }) {
      const groupRef = useRef();
      // 严格匹配你 GitHub 中的图片名称
      const images = ['1.JPG', '2.jpg', '3.jpg', '4.JPG', '5.JPG', '6.JPG', '7.JPG', '8.JPG'];
      
      const refs = useRef(images.map(() => React.createRef()));

      useFrame((state) => {
        if (!groupRef.current) return;
        if (activeIndex === null) {
          // 正常轮换模式
          groupRef.current.rotation.y += 0.005;
        } else {
          // 放大模式：停止旋转并缓慢对准摄像机
          groupRef.current.rotation.y = THREE.MathUtils.lerp(groupRef.current.rotation.y, (activeIndex / images.length) * Math.PI * 2, 0.05);
        }

        // 动画控制每张照片的位置
        refs.current.forEach((ref, i) => {
          if (!ref.current) return;
          const angle = (i / images.length) * Math.PI * 2;
          
          if (activeIndex === i) {
            // 被选中的照片飞到正前方并放大
            ref.current.position.lerp(new THREE.Vector3(0, 0, 5), 0.05);
            ref.current.scale.lerp(new THREE.Vector3(3, 3 * 1.33, 1), 0.05);
            ref.current.rotation.set(0, 0, 0); // 面朝屏幕
          } else {
            // 其他照片在环形轨道上
            const radius = 4;
            const targetX = Math.cos(angle) * radius;
            const targetZ = Math.sin(angle) * radius;
            ref.current.position.lerp(new THREE.Vector3(targetX, (Math.random()-0.5)*0.5, targetZ), 0.05);
            ref.current.scale.lerp(new THREE.Vector3(1.5, 1.5 * 1.33, 1), 0.05);
            
            // 计算朝向圆心的旋转角度
            const targetRotationY = -angle + Math.PI / 2;
            ref.current.rotation.set(0, targetRotationY, 0);
          }
        });
      });

      if (phase < 4) return null; // 只有在吹灭蜡烛后才显示相册

      return (
        <group ref={groupRef}>
          {images.map((url, i) => (
            <DreiImage key={url} ref={refs.current[i]} url={url} transparent opacity={activeIndex === null || activeIndex === i ? 1 : 0.2} />
          ))}
        </group>
      );
    }

    // === 主程序与状态机 ===
    function App() {
      // 阶段：-1(未开始), 0(需比3), 1(需比2), 2(需比1), 3(需吹气), 4(庆典与画廊)
      const [phase, setPhase] = useState(-1); 
      const [activeIndex, setActiveIndex] = useState(null);
      const [hint, setHint] = useState("");
      
      const lastGestureTime = useRef(Date.now());

      // 启动初始化
      const startMagic = () => {
        setPhase(0);
        setHint("请对着屏幕竖起 3 根手指");
        // 预热麦克风权限
        navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => {});
      };

      // 监听吹气
      useAudioBlowDetector(phase === 3, () => {
        setPhase(4);
        setHint("尝试单手比心(捏合)抓取照片，比OK手势恢复旋转！");
        
        // 触发绚丽彩带
        const duration = 3000;
        const end = Date.now() + duration;
        (function frame() {
          confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#81D8D0', '#FFB6C1', '#FFF'] });
          confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#81D8D0', '#FFB6C1', '#FFF'] });
          if (Date.now() < end) requestAnimationFrame(frame);
        }());
      });

      // 摄像头与手势识别引擎
      useEffect(() => {
        if (phase < 0) return;
        const videoElement = document.getElementById('webcam');
        
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
          if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;
          const lm = results.multiHandLandmarks[0];
          
          const now = Date.now();
          if (now - lastGestureTime.current < 1000) return; // 防抖，避免识别过快闪烁

          // 手指伸展检测逻辑
          const isFingerUp = (tip, pip) => lm[tip].y < lm[pip].y;
          const fingersUp = [
            lm[4].x < lm[3].x, // 拇指 (简化)
            isFingerUp(8, 6),  // 食指
            isFingerUp(12, 10),// 中指
            isFingerUp(16, 14),// 无名指
            isFingerUp(20, 18) // 小指
          ].filter(Boolean).length;

          // 状态机流转逻辑
          setPhase(prev => {
            if (prev === 0 && fingersUp === 3) { lastGestureTime.current = now; setHint("很棒！现在比出 2"); return 1; }
            if (prev === 1 && fingersUp === 2) { lastGestureTime.current = now; setHint("完美！最后比出 1"); return 2; }
            if (prev === 2 && fingersUp === 1) { 
              lastGestureTime.current = now; 
              setHint("倒计时完成！对着麦克风用力吹灭蜡烛吧！"); 
              return 3; 
            }
            
            // 第4阶段：画廊交互
            if (prev === 4) {
              const thumbTip = lm[4], indexTip = lm[8], middleTip = lm[12], ringTip = lm[16];
              const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
              
              // OK 手势 (食指拇指捏合，其他三指竖起)
              const isOK = pinchDist < 0.05 && isFingerUp(12, 10) && isFingerUp(16, 14);
              // 单手比心/捏合抓取 (食指拇指捏合，其他三指收缩或随意)
              const isPinchGrab = pinchDist < 0.05 && !isOK;

              if (isPinchGrab) {
                // 随机抓取一张照片
                setActiveIndex(prevIndex => prevIndex === null ? Math.floor(Math.random() * 8) : prevIndex);
                lastGestureTime.current = now;
              } else if (isOK) {
                // 恢复轮播
                setActiveIndex(null);
                lastGestureTime.current = now;
              }
            }
            return prev;
          });
        });

        const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({ image: videoElement }); }, width: 640, height: 480 });
        camera.start();
      }, [phase]);

      return (
        <div className="w-full h-full relative font-['Noto_Serif_SC']">
          {/* 开始界面蒙版 */}
          {phase === -1 && (
            <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/90">
              <h1 className="text-4xl text-[#81D8D0] neon-text mb-8 tracking-widest font-['Luxurious_Script']">CC's Birthday Magic</h1>
              <button onClick={startMagic} className="px-8 py-3 rounded-full border border-[#81D8D0] text-[#81D8D0] hover:bg-[#81D8D0] hover:text-black transition duration-300">
                开启魔法 (允许摄像头与麦克风)
              </button>
            </div>
          )}

          {/* 状态提示文字 */}
          {phase >= 0 && (
            <div className="absolute top-10 w-full text-center z-10 pointer-events-none">
              <h1 className="text-2xl text-white tracking-widest drop-shadow-md">{hint}</h1>
            </div>
          )}

          {/* 3D 场景 */}
          <Canvas camera={{ position: [0, 2, 9], fov: 45 }}>
            <color attach="background" args={['#050508']} />
            <ambientLight intensity={phase >= 4 ? 1 : 0.2} />
            
            {/* 顶部的“蜡烛”光晕 */}
            {phase < 4 && <pointLight position={[0, 3, 0]} intensity={2} color="#FFA500" distance={10} />}
            
            {/* 蛋糕主体 */}
            <Cake phase={phase} />
            
            {/* 庆典文字 (中文字体CDN) */}
            {phase >= 4 && (
              <Text 
                position={[0, 3.5, 0]} 
                fontSize={0.8} 
                color="#81D8D0" 
                font="https://fonts.gstatic.com/s/notosanssc/v36/k3kXo84MPYn4dIdJsslsBzxw.woff"
                anchorX="center" 
                anchorY="middle"
              >
                CC 22岁生日快乐！
              </Text>
            )}

            {/* 画廊 */}
            <React.Suspense fallback={null}>
              <PhotoGallery phase={phase} activeIndex={activeIndex} />
            </React.Suspense>
            
            <OrbitControls enablePan={false} enableZoom={false} enableDamping dampingFactor={0.05} />
          </Canvas>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
