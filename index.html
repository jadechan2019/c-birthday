<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC的22岁生日 | 宇宙级浪漫</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Luxurious+Script&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.160.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber",
        "@react-three/postprocessing": "https://esm.sh/@react-three/postprocessing@2.16.0?external=react,react-dom,three,@react-three/fiber"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #010102; overflow: hidden; font-family: 'Noto Serif SC', serif; }
    #root { width: 100%; height: 100%; }
    .glass-btn {
      background: rgba(129, 216, 208, 0.1); backdrop-filter: blur(10px); 
      border: 1px solid rgba(129, 216, 208, 0.4); box-shadow: 0 0 20px rgba(129, 216, 208, 0.2);
    }
    .neon-text { text-shadow: 0 0 10px rgba(129,216,208,0.6), 0 0 20px rgba(129,216,208,0.4); }
  </style>
</head>
<body>
  <div id="root"></div>
  <video id="webcam" class="hidden" playsinline autoplay></video>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo, Suspense } from 'react';
    import { createRoot } from 'react-dom/client';
    import * as THREE from 'three';
    import { Canvas, useFrame } from '@react-three/fiber';
    import { OrbitControls, Image as DreiImage, Text } from '@react-three/drei';
    import { EffectComposer, Bloom, Noise } from '@react-three/postprocessing';

    // ==========================================
    // 麦克风音频分析 (检测吹气)
    // ==========================================
    function useBlowDetector(isActive, onBlow) {
      useEffect(() => {
        if (!isActive) return;
        let audioCtx, analyser, dataArray, reqId;

        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          const source = audioCtx.createMediaStreamSource(stream);
          source.connect(analyser);
          analyser.fftSize = 256;
          dataArray = new Uint8Array(analyser.frequencyBinCount);

          const detect = () => {
            analyser.getByteFrequencyData(dataArray);
            const avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
            if (avg > 70) { // 吹气阈值
              onBlow();
            } else {
              reqId = requestAnimationFrame(detect);
            }
          };
          detect();
        }).catch(e => console.warn("Mic error:", e));

        return () => {
          if (reqId) cancelAnimationFrame(reqId);
          if (audioCtx) audioCtx.close();
        };
      }, [isActive, onBlow]);
    }

    // ==========================================
    // 顶级 WebGL 粒子形态着色器 (Cake to Galaxy)
    // ==========================================
    const PARTICLE_COUNT = 50000;
    
    const vertexShader = `
      attribute vec3 aGalaxyPos;
      attribute vec3 aCakePos;
      attribute vec3 aColor;
      uniform float uProgress;
      uniform float uTime;
      varying vec3 vColor;

      void main() {
        // 数学形态平滑过渡 (Lerp)
        vec3 pos = mix(aCakePos, aGalaxyPos, uProgress);
        
        // 能量脉冲与呼吸感
        float breathing = sin(uTime * 1.5 + pos.y * 3.0) * 0.03;
        pos.y += breathing;
        
        vec4 mvPosition = modelViewMatrix * instanceMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        vColor = aColor;
      }
    `;

    const fragmentShader = `
      varying vec3 vColor;
      void main() {
        // 配合 Bloom 的 luminanceThreshold=1.1，让粒子产生极亮辉光
        gl_FragColor = vec4(vColor * 2.8, 1.0); 
      }
    `;

    function MagicMorphingSystem({ isExploded }) {
      const meshRef = useRef(null);
      const matRef = useRef(null);

      const { cakePos, galaxyPos, colors } = useMemo(() => {
        const cPos = new Float32Array(PARTICLE_COUNT * 3);
        const gPos = new Float32Array(PARTICLE_COUNT * 3);
        const cols = new Float32Array(PARTICLE_COUNT * 3);
        
        const tiffanyBlue = new THREE.Color('#81D8D0');
        const deepCyan = new THREE.Color('#1E5959');
        const champagneGold = new THREE.Color('#FFD700');

        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const i3 = i * 3;
          
          // 1. 7层蛋糕形态 (Cake Topology)
          if (i < 40000) { // 蛋糕主体
            const tier = Math.floor((i / 40000) * 7); // 0-6层
            const rMax = 2.2 - tier * 0.28; 
            const r = Math.sqrt(Math.random()) * rMax; 
            const theta = Math.random() * Math.PI * 2;
            const y = tier * 0.45 - 1.2;

            cPos[i3] = Math.cos(theta) * r;
            cPos[i3+1] = y;
            cPos[i3+2] = Math.sin(theta) * r;

            const col = tiffanyBlue.clone().lerp(deepCyan, tier / 7);
            cols[i3] = col.r; cols[i3+1] = col.g; cols[i3+2] = col.b;
          } else { // 香槟金丝带流光 (缠绕蛋糕)
            const t = Math.random() * Math.PI * 24; 
            const r = 2.3 - (t / (Math.PI*24)) * 2.0; 
            cPos[i3] = Math.cos(t) * r + (Math.random()-0.5)*0.1;
            cPos[i3+1] = (t / (Math.PI*24)) * 3.1 - 1.2 + (Math.random()-0.5)*0.1;
            cPos[i3+2] = Math.sin(t) * r + (Math.random()-0.5)*0.1;

            cols[i3] = champagneGold.r; cols[i3+1] = champagneGold.g; cols[i3+2] = champagneGold.b;
          }

          // 2. Fibonacci 螺旋星系形态 (Galaxy Topology)
          const goldenAngle = 2.39996323;
          const rGal = Math.sqrt(i) * 0.06;
          const angle = i * goldenAngle;
          gPos[i3] = Math.cos(angle) * rGal;
          gPos[i3+1] = (Math.random() - 0.5) * (1.2 / (rGal + 0.1));
          gPos[i3+2] = Math.sin(angle) * rGal;
        }
        return { cakePos: cPos, galaxyPos: gPos, colors: cols };
      }, []);

      useFrame((state) => {
        if (!matRef.current || !meshRef.current) return;
        matRef.current.uniforms.uTime.value = state.clock.elapsedTime;
        
        // 形态插值动画
        const target = isExploded ? 1.0 : 0.0;
        matRef.current.uniforms.uProgress.value = THREE.MathUtils.lerp(
          matRef.current.uniforms.uProgress.value, target, 0.02
        );
        
        // 缓慢自转
        meshRef.current.rotation.y += 0.002;
      });

      return (
        <instancedMesh ref={meshRef} args={[null, null, PARTICLE_COUNT]}>
          <octahedronGeometry args={[0.015, 0]}>
            <instancedBufferAttribute attach="attributes-aCakePos" args={[cakePos, 3]} />
            <instancedBufferAttribute attach="attributes-aGalaxyPos" args={[galaxyPos, 3]} />
            <instancedBufferAttribute attach="attributes-aColor" args={[colors, 3]} />
          </octahedronGeometry>
          <shaderMaterial 
            ref={matRef} vertexShader={vertexShader} fragmentShader={fragmentShader}
            uniforms={{ uProgress: { value: 0 }, uTime: { value: 0 } }}
            transparent depthWrite={false} blending={THREE.AdditiveBlending}
          />
        </instancedMesh>
      );
    }

    // ==========================================
    // 动态相册画廊
    // ==========================================
    function PhotoGallery({ isExploded, activeIndex }) {
      const groupRef = useRef();
      const images = ['1.JPG', '2.jpg', '3.jpg', '4.JPG', '5.JPG', '6.JPG', '7.JPG', '8.JPG'];
      const refs = useRef(images.map(() => React.createRef()));

      useFrame(() => {
        if (!groupRef.current) return;
        
        if (activeIndex === null) {
          groupRef.current.rotation.y += 0.003; // 正常环绕
        } else {
          // 锁定视角防抖
          groupRef.current.rotation.y = THREE.MathUtils.lerp(
            groupRef.current.rotation.y, (activeIndex / images.length) * Math.PI * 2, 0.05
          );
        }

        refs.current.forEach((ref, i) => {
          if (!ref.current) return;
          const angle = (i / images.length) * Math.PI * 2;
          
          if (activeIndex === i) {
            // 被选中抓取至眼前
            ref.current.position.lerp(new THREE.Vector3(0, 0.5, 4.5), 0.08);
            ref.current.scale.lerp(new THREE.Vector3(2.5, 2.5 * 1.33, 1), 0.08);
            ref.current.rotation.set(0, 0, 0);
          } else {
            // 轨道模式
            const radius = 4.5;
            const targetX = Math.cos(angle) * radius;
            const targetZ = Math.sin(angle) * radius;
            ref.current.position.lerp(new THREE.Vector3(targetX, Math.sin(angle * 2) * 0.5, targetZ), 0.05);
            ref.current.scale.lerp(new THREE.Vector3(1.2, 1.2 * 1.33, 1), 0.05);
            ref.current.rotation.set(0, -angle + Math.PI / 2, 0);
          }
        });
      });

      if (!isExploded) return null;

      return (
        <group ref={groupRef}>
          {images.map((url, i) => (
            <DreiImage key={url} ref={refs.current[i]} url={url} transparent opacity={activeIndex === null || activeIndex === i ? 0.95 : 0.15} />
          ))}
        </group>
      );
    }

    // ==========================================
    // 主控状态机与 UI 引擎
    // ==========================================
    function App() {
      // -1(预备), 0(比3), 1(比2), 2(比1), 3(吹蜡烛), 4(星系爆发)
      const [phase, setPhase] = useState(-1);
      const [activeIndex, setActiveIndex] = useState(null);
      const [hint, setHint] = useState("");
      const throttleTimer = useRef(Date.now());

      const startMagic = () => {
        setPhase(0); setHint("请对着屏幕竖起 3 根手指");
        navigator.mediaDevices.getUserMedia({ audio: true }).catch(()=>{});
      };

      // 吹气监听
      useBlowDetector(phase === 3, () => {
        setPhase(4);
        setHint("单手比心抓取照片放大，比OK手势恢复旋转！");
        // 顶级奢华彩带特效
        const end = Date.now() + 4000;
        (function frame() {
          confetti({ particleCount: 8, angle: 60, spread: 65, origin: { x: 0 }, colors: ['#81D8D0', '#FFD700', '#FFFFFF'] });
          confetti({ particleCount: 8, angle: 120, spread: 65, origin: { x: 1 }, colors: ['#81D8D0', '#FFD700', '#FFFFFF'] });
          if (Date.now() < end) requestAnimationFrame(frame);
        }());
      });

      // 计算机视觉手势分析
      useEffect(() => {
        if (phase < 0) return;
        const videoElement = document.getElementById('webcam');
        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
          if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;
          const lm = results.multiHandLandmarks[0];
          const now = Date.now();
          if (now - throttleTimer.current < 1000) return; // 防抖

          const isFingerUp = (tip, pip) => lm[tip].y < lm[pip].y;
          const fingersUp = [ lm[4].x < lm[3].x, isFingerUp(8, 6), isFingerUp(12, 10), isFingerUp(16, 14), isFingerUp(20, 18) ].filter(Boolean).length;

          setPhase(prev => {
            if (prev === 0 && fingersUp === 3) { throttleTimer.current = now; setHint("收到！请比出 2"); return 1; }
            if (prev === 1 && fingersUp === 2) { throttleTimer.current = now; setHint("完美！最后比出 1"); return 2; }
            if (prev === 2 && fingersUp === 1) { throttleTimer.current = now; setHint("倒数完成！对着麦克风用力吹灭蜡烛吧！"); return 3; }
            
            if (prev === 4) {
              const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
              const isOK = pinchDist < 0.05 && isFingerUp(12, 10) && isFingerUp(16, 14);
              const isPinchGrab = pinchDist < 0.05 && !isOK;

              if (isPinchGrab) {
                setActiveIndex(Math.floor(Math.random() * 8));
                throttleTimer.current = now;
              } else if (isOK) {
                setActiveIndex(null);
                throttleTimer.current = now;
              }
            }
            return prev;
          });
        });

        const camera = new Camera(videoElement, { onFrame: async () => await hands.send({ image: videoElement }), width: 640, height: 480 });
        camera.start();
      }, [phase]);

      return (
        <div className="w-full h-full relative">
          {phase === -1 && (
            <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm">
              <h1 className="text-5xl text-[#81D8D0] neon-text mb-10 font-['Luxurious_Script'] tracking-wider">CC's 22nd Birthday</h1>
              <button onClick={startMagic} className="glass-btn px-8 py-3 rounded-full text-white tracking-widest hover:bg-[#81D8D0] hover:text-black transition-all duration-500">
                开启魔法引擎 (允许摄像头/麦克风)
              </button>
            </div>
          )}

          {phase >= 0 && (
            <div className="absolute top-12 w-full text-center z-10 pointer-events-none">
              <h2 className="text-2xl text-white tracking-widest drop-shadow-[0_0_8px_rgba(255,255,255,0.8)] font-light">
                {hint}
              </h2>
            </div>
          )}

          <Canvas camera={{ position: [0, 2, 8], fov: 45 }}>
            <color attach="background" args={['#010102']} />
            <ambientLight intensity={phase === 4 ? 0.8 : 0.2} />
            
            {/* 顶部的“蜡烛”光源，吹灭后消失 */}
            {phase < 4 && <pointLight position={[0, 2.5, 0]} intensity={3} color="#FFD700" distance={8} />}

            <MagicMorphingSystem isExploded={phase === 4} />
            
            {phase === 4 && (
              <Text 
                position={[0, 3.5, 0]} 
                fontSize={0.8} 
                color="#81D8D0" 
                font="https://fonts.gstatic.com/s/notosanssc/v36/k3kXo84MPYn4dIdJsslsBzxw.woff"
                anchorX="center" anchorY="middle"
              >
                CC 22岁生日快乐！
              </Text>
            )}

            <Suspense fallback={null}>
              <PhotoGallery isExploded={phase === 4} activeIndex={activeIndex} />
            </Suspense>

            <EffectComposer disableNormalPass>
              {/* 核心视觉魔法：亮度过滤。确保照片不泛光，只让粒子产生奢华辉光 */}
              <Bloom luminanceThreshold={1.1} mipmapBlur intensity={2.0} />
              <Noise opacity={0.04} />
            </EffectComposer>
            
            <OrbitControls enablePan={false} enableZoom={false} enableDamping dampingFactor={0.05} />
          </Canvas>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
